[build]
  command = "npx vite build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Route contact form API calls to the serverless function
[[redirects]]
  from = "/api/messages"
  to = "/.netlify/functions/messages"
  status = 200

# SPA catch-all — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
